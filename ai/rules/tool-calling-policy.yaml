version: "1.0"
policy: "balanced"

auto_run:
  - "resolve"
  - "validate"
  - "explain"
  - "mcp status"
  - "tasks intake"
  - "tasks plan"
  - "tasks list"
  - "text check"
  - "questions status"

confirm_required:
  - "init"
  - "sync"
  - "questions run"
  - "questions ask"
  - "tasks enable"
  - "tasks disable"
  - "tasks status"
  - "mcp connect"
  - "mcp disconnect"
  - "tasks sync"

deny:
  - "unknown_command"
