schema_version: "1"
enabled: true
log_level: "info" # debug | info | warn | error
store_format: "jsonl"

paths:
  activity: "activity.log"
  errors: "errors.log"
  audit: "audit.log"
  sessions_dir: "sessions/"

retention:
  days: 30
  max_file_size_mb: 10
  rotation: "daily" # daily | size_based

redaction:
  mask_secrets: true
  mask_pii: true
  redact_fields:
    - "token"
    - "password"
    - "secret"
    - "apiKey"
    - "authorization"

audit:
  enabled: true
  require_for_events:
    - "write_confirmation"
    - "quality_gate_override"
    - "escalation"
    - "destructive_action_request"

sampling:
  debug_sample_rate: 0.1

failure_mode:
  on_log_write_error: "continue_with_warning"

