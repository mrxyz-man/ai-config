schema_version: "1"
status: "not_started" # not_started | in_progress | completed

metadata:
  question_locale_source: ".ai/manifest.yaml#ui_locale"
  question_locale_policy: "strict"
  guidance: "All user-facing question text must match ui_locale from manifest."

sections:
  - id: "project-context"
    title: "Context Bootstrap"
    required: true
    questions:
      - id: "project-goal"
        question: "<generate question in ui_locale: main project goal>"
        required: true
        targets:
          - "project/description.md"
        help_text: "<generate help text in ui_locale>"
        example_answer: "<generate example answer in ui_locale>"
        answer: null
        answer_status: "missing" # missing | partial | complete
        updated_at: null

      - id: "tech-stack"
        question: "<generate question in ui_locale: current tech stack>"
        required: true
        targets:
          - "project/tech-stack.yaml"
          - "config.yaml"
        help_text: "<generate help text in ui_locale>"
        example_answer: "<generate example answer in ui_locale>"
        answer: null
        answer_status: "missing"
        updated_at: null
